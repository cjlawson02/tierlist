<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta
			name="description"
			content="Live Tier List presentation — rank photos into S through F tiers."
		/>
		<link rel="canonical" href="https://tierlist.chrislawson.dev/" />
		<meta name="theme-color" content="#1a1a2e" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Tier List Presenter" />
		<meta property="og:title" content="Tier List Presenter" />
		<meta
			property="og:description"
			content="Live Tier List presentation — rank photos into S through F tiers."
		/>
		<meta property="og:url" content="https://tierlist.chrislawson.dev/" />
		<meta
			property="og:image"
			content="https://tierlist.chrislawson.dev/og-image.png"
		/>
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1536" />
		<meta property="og:image:height" content="1024" />
		<meta
			property="og:image:alt"
			content="Tier List Presenter — colorful S through F tier rows"
		/>

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Tier List Presenter" />
		<meta
			name="twitter:description"
			content="Live Tier List presentation — rank photos into S through F tiers."
		/>
		<meta
			name="twitter:image"
			content="https://tierlist.chrislawson.dev/og-image.png"
		/>
		<meta
			name="twitter:image:alt"
			content="Tier List Presenter — colorful S through F tier rows"
		/>

		<title>Tier List Presenter</title>
	</head>
	<body>
		<div id="root">
			<p style="font-family: system-ui, sans-serif; padding: 2rem; color: #666">
				Loading…
			</p>
		</div>
		<script type="module" src="/src/main.tsx"></script>
		<script>
			setTimeout(function () {
				var root = document.getElementById('root');
				if (
					root &&
					root.childNodes.length === 1 &&
					root.textContent.trim() === 'Loading…'
				) {
					root.innerHTML =
						'<div style="font-family:system-ui,sans-serif;padding:2rem;max-width:40rem;line-height:1.5">' +
						'<h1>Tier List Presenter</h1>' +
						'<p>Run the dev server first — opening <code>index.html</code> directly will not work.</p>' +
						'<pre style="background:#f4f4f4;padding:1rem;border-radius:4px">npm run dev</pre>' +
						'<p>Then open <a href="http://localhost:5173/">http://localhost:5173/</a></p>' +
						'</div>';
				}
			}, 3000);
		</script>
	</body>
</html>
